name: Infracost Scan

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  infracost:
    name: Run Infracost
    runs-on: ubuntu-latest

    steps:
      # Checkout PR code
      - name: Checkout PR branch
        uses: actions/checkout@v4

      # Install Infracost
      - name: Install Infracost
        run: |
          curl -fsSL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh | sh
          echo "/home/runner/.infracost/bin" >> $GITHUB_PATH

      # Checkout base branch for comparison
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          path: base

      # Generate baseline cost
      - name: Generate baseline
        run: |
          infracost breakdown \
            --path=./base/terraform \
            --format=json \
            --out-file=/tmp/base.json
        env:
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}

      # Generate diff (THIS sends data to Infracost Cloud)
      - name: Generate cost diff
        run: |
          infracost diff \
            --path=./terraform \
            --compare-to=/tmp/base.json \
            --format=json \
            --out-file=/tmp/diff.json
        env:
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}

      # Post PR comment
      - name: Comment on PR
        continue-on-error: true
        run: |
          infracost comment github \
            --path=/tmp/diff.json \
            --repo=${{ github.repository }} \
            --github-token=${{ secrets.GITHUB_TOKEN }} \
            --pull-request=${{ github.event.pull_request.number }} \
            --behavior=update
        env:
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}